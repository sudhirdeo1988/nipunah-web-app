# Netlify Configuration for Next.js Application
# https://docs.netlify.com/configure-builds/file-based-configuration/



# IMPORTANT: Do not use a blanket /api/* rewrite to the remote server.
# - Next.js routes in src/app/api/** must run (they add auth, remap paths, etc.).
# - A rewrite like /api/auth/changePassword → remote .../api/auth/changePassword
#   would bypass the proxy logic that injects the Bearer token.
# - netlify dev and Netlify edge can also intercept /api/* before Next.js.
#
# API proxying is implemented in src/app/api/*/route.js (e.g. changePassword → /auth/changePassword).
#
# [[redirects]]
#   from = "/api/*"
#   to = "http://139.59.22.7:8080/api/:splat"
#   status = 200
#   force = true

